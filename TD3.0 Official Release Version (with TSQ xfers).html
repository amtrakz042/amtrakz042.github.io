<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUA Transit Dispatch 3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.4/dist/protobuf.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --accent-green: #30d158;
            --accent-blue: #0a84ff;
            --accent-warn: #ff9f0a;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-stack);
            margin: 0;
            padding: 15px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header-container {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; padding: 0 10px; border-bottom: 2px solid #333;
            padding-bottom: 8px; flex-shrink: 0;
        }

        .header-left-text { font-weight: 700; font-size: 1.1em; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; }
        .header-highlight { color: var(--accent-warn); font-weight: 900; text-transform: uppercase; }
        .header-purple-grad { background: linear-gradient(90deg, #E0AAFF, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }

        /* DATE & TIME */
        .header-right { text-align: right; display: flex; align-items: center; gap: 15px; }
        .datetime-group {
            font-family: var(--font-stack); font-weight: 700; font-size: 1.3em;
            background: linear-gradient(180deg, #FCCC0A, #ffffff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(252, 204, 10, 0.2);
        }

        /* GRID LAYOUT - 5 ROWS - Extended vertical room for row 2 to accommodate TimesSq chips */
        .board-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            grid-template-rows: 0.75fr 1.4fr 1.15fr 0.9fr 0.75fr;
            gap: 12px; flex-grow: 1; min-height: 0;
        }

        .transit-card {
            background-color: var(--card-bg); border-radius: 12px;
            padding: 6px 14px; display: flex; flex-direction: column;
            justify-content: flex-start; position: relative; overflow: hidden; 
        }

        .transit-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; z-index: 10; }

        /* Line Gradients */
        .grad-bar-1::before { background: linear-gradient(180deg, #EE352E, #9e231e); }
        .grad-bar-23::before { background: linear-gradient(180deg, #EE352E, #9e231e); }
        .grad-bar-ACE::before { background: linear-gradient(180deg, #0039A6, #001f5c); }
        .grad-bar-RW::before { background: linear-gradient(180deg, #FCCC0A, #b39200); }
        .grad-bar-JZ::before { background: linear-gradient(180deg, #996633, #5e3f1f); }
        .grad-bar-green::before { background: linear-gradient(180deg, #30d158, #005c1f); }
        .grad-bar-EJZ::before { background: linear-gradient(180deg, #0039A6, #996633); }
        .grad-bar-RW45::before { background: linear-gradient(180deg, #FCCC0A, #00933C); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* BRANDING */
        .branding-card { background-color: transparent; border: none; flex-direction: row; align-items: center; justify-content: flex-start; padding: 0; }
        .branding-card::before { display: none; }
        .project-name { font-weight: 800; font-size: 1.8em; letter-spacing: -1px; background: linear-gradient(45deg, #FFD700 0%, #FCCC0A 20%, #ffffff 70%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .brand-details { display: flex; flex-direction: column; justify-content: center; }
        .brand-main { font-size: 0.8em; font-weight: 500; color: #fff; line-height: 1.3; }
        .brand-sub { font-size: 0.7em; color: var(--text-dim); font-style: italic; display: flex; align-items: center; gap: 4px; }

        /* HEADER STYLES */
        .card-header-inline { 
            display: flex; align-items: center; justify-content: space-between; 
            width: 100%; margin-bottom: 4px; flex-shrink: 0; 
            overflow-x: auto; white-space: nowrap; gap: 10px;
        }
        
        .header-text-group { 
            display: flex; align-items: center; font-size: 1.1em; font-weight: 700; 
            color: #fff; white-space: nowrap; flex-shrink: 0; 
        }
        
        .header-icons-group { display: flex; gap: 5px; flex-shrink: 0; }

        .header-inline-station { margin-right: 6px; }
        .direction-tag { font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 6px; }
        .dir-downtown { color: var(--accent-green); }
        .dir-uptown { color: var(--accent-blue); }

        .vertical-divider { width: 2px; background: linear-gradient(180deg, rgba(123, 44, 191, 0), rgba(123, 44, 191, 1), rgba(224, 170, 255, 1), rgba(123, 44, 191, 1), rgba(123, 44, 191, 0)); margin: 0 10px; opacity: 0.9; flex-shrink: 0; }

        .train-row { display: flex; align-items: center; padding: 4px 0; gap: 15px; overflow: hidden; flex-grow: 1; justify-content: space-between; }

        /* NEXT/SECOND LAYOUT STYLES */
        .split-body { display: flex; flex: 1; overflow: hidden; gap: 0; }
        .split-body-left { flex: 1; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; padding-right: 5px; }
        .split-body-right { flex: 1; display: flex; flex-direction: column; justify-content: space-between; padding-left: 5px; overflow: hidden; }
        .train-main-info { display: flex; align-items: center; gap: 10px; margin: 4px 0; }
        .second-train-row { display: flex; align-items: center; justify-content: space-between; margin: 4px 0; min-height: 34px; gap: 15px; }
        .train-time-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .split-sub-header { font-size: 0.6em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 2px; }

        .next-up-block { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; }
        .next-up-chips-row { display: flex; gap: 4px; align-items: center; }

        .conn-block { margin-top: 4px; width: 100%; display: flex; flex-direction: column; padding-bottom: 2px; }
        .conn-label-block { display: block; margin-bottom: 2px; }
        .conn-chips-row { display: flex; gap: 5px; overflow-x: auto; white-space: nowrap; }

        .time-large { font-size: 1.7em; font-weight: 700; letter-spacing: -1px; line-height: 1; }
        .time-med { font-size: 1.4em; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
        .time-sub { font-size: 0.6em; color: var(--text-dim); font-weight: 500; margin-left: 2px; }
        .time-warn { color: var(--accent-warn); }

        .conn-label { font-size: 0.6em; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
        
        .grad-cold { background: linear-gradient(45deg, #5AC8FA, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad-ai { background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .grad-text-blue { background: linear-gradient(90deg, #0a84ff 0%, #0a84ff 25%, #ffffff 85%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad-text-green { background: linear-gradient(90deg, #30d158 0%, #30d158 25%, #ffffff 85%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad-text-yellow { background: linear-gradient(90deg, #FCCC0A 0%, #FCCC0A 25%, #ffffff 85%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad-text-orange { background: linear-gradient(90deg, #FF6319 0%, #FF6319 25%, #ffffff 85%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad-text-brown { background: linear-gradient(90deg, #996633 0%, #996633 25%, #ffffff 85%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad-text-purple { background: linear-gradient(90deg, #B933AD 0%, #B933AD 25%, #ffffff 85%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad-text-gray { background: linear-gradient(90deg, #808183 0%, #808183 25%, #ffffff 85%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .grad-following { background: linear-gradient(90deg, #FFD700 0%, #FCCC0A 30%, #FFF8E7 70%, #FFFFFF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

        .chip { background: #333; padding: 1px 6px; border-radius: 4px; display: flex; align-items: center; gap: 4px; font-weight: 600; font-size: 0.8em; flex-shrink: 0; }
        .chip-time-pos { color: var(--accent-green); }
        .chip-time-warn { color: #ff9f0a; }

        .bullet { display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; border-radius: 50%; }
        .b-main { width: 30px; height: 30px; font-size: 16px; } 
        .b-med { width: 26px; height: 26px; font-size: 14px; }
        .b-lg { width: 22px; height: 22px; font-size: 12px; opacity: 0.8; }
        .b-sm { width: 16px; height: 16px; font-size: 9px; }
        
        .b-diamond { border-radius: 3px; transform: rotate(45deg); box-shadow: 0 0 2px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; margin: 0 4px; }
        .b-diamond.b-main { width: 21.5px; height: 21.5px; font-size: 14px; }
        .b-diamond.b-med { width: 18.5px; height: 18.5px; font-size: 12px; }
        .b-diamond.b-lg { width: 15.5px; height: 15.5px; font-size: 10px; }
        .b-diamond.b-sm { width: 11.5px; height: 11.5px; font-size: 8px; }
        .b-diamond span { transform: rotate(-45deg); display: block; margin-top: 0.5px; margin-left: 0.5px; }

        .b-1, .b-2, .b-3 { background-color: #EE352E; }
        .b-4, .b-5, .b-6, .b-6X { background-color: #00933C; }
        .b-A, .b-C, .b-E { background-color: #0039A6; }
        .b-B, .b-D, .b-F, .b-M, .b-FX { background-color: #FF6319; }
        .b-N, .b-Q, .b-R, .b-W { background-color: #FCCC0A; color: black !important; }
        .b-J, .b-Z { background-color: #996633; }
        .b-7, .b-7X { background-color: #B933AD; }
        .b-S, .b-GS, .b-L { background-color: #808183; }
        .b-SF { background-color: #FF6319; width: auto; padding: 0 6px; border-radius: 4px; font-size: 11px; height: 18px; }
        
        .tag-lirr { border-radius: 3px; padding: 1px 4px; font-size: 9px; font-weight: bold; color: white; margin-right: 4px; }
        .tag-exp { background-color: #EE352E; } .tag-lcl { background-color: #0039A6; } 
        .error-msg { color: #ff453a; font-size: 0.8em; font-weight: bold; } .dim { opacity: 0.5; font-size: 0.9em; }

        .split-card-container { display: flex; flex-direction: row; height: 100%; overflow-x: auto; white-space: nowrap; }
        .split-half { flex: 1; min-width: 45%; display: flex; flex-direction: column; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="header-left-text">
            <span class="header-highlight">SPEED-WALK</span>
            <span class="header-purple-grad">&nbsp;to make&nbsp;</span>
            <span class="header-highlight">ORANGE</span>
            <span class="header-purple-grad">&nbsp;arrival times!</span>
        </div>
        <div class="header-right">
            <span class="datetime-group" id="datetime">
                <span id="date">Tue, Nov 25</span>
                <span style="margin: 0 10px;">•</span>
                <span id="clock">00:00:00 PM</span>
            </span>
        </div>
    </div>

    <div class="board-grid" id="board">
        <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: #666;">Initialize System...</div>
    </div>

<script>
    const FEEDS = {
        'ACE': 'https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-ace',
        'BDFM': 'https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-bdfm',
        'NQRW': 'https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-nqrw',
        'IRT': 'https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs',
        'JZ': 'https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/nyct%2Fgtfs-jz'
    };

    const RIDE_TIMES = { 'ChambersToAtlantic': 14, 'ChambersToJay': 6, 'ChambersToW4': 6, 'ChambersToTimesSq': 9 };
    const FERRY_SCHED = ["00:00", "00:30", "01:00", "01:30", "02:00", "02:30", "03:00", "03:30", "04:00", "04:30", "05:00", "05:30", "06:00", "06:30", "06:50", "07:10", "07:30", "07:45", "08:00", "08:15", "08:30", "08:45", "09:00", "09:15", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:20", "16:40", "17:00", "17:15", "17:30", "17:45", "18:00", "18:15", "18:30", "18:45", "19:00", "19:20", "19:40", "20:00", "20:30", "21:00", "21:30", "22:00", "22:30", "23:00", "23:30"];
    const LIRR_PW_SCHED = [{t:"00:27", k:"ALL STOPS"}, {t:"03:17", k:"ALL STOPS"}, {t:"05:19", k:"ALL STOPS"}, {t:"06:55", k:"ALL STOPS"}, {t:"08:17", k:"ALL STOPS"}, {t:"09:16", k:"ALL STOPS"}, {t:"10:16", k:"ALL STOPS"}, {t:"11:16", k:"ALL STOPS"}, {t:"12:16", k:"ALL STOPS"}, {t:"13:16", k:"ALL STOPS"}, {t:"14:21", k:"ALL STOPS"}, {t:"15:14", k:"ALL STOPS"}, {t:"16:16", k:"EXP via BAYSIDE"}, {t:"16:19", k:"ALL STOPS"}, {t:"17:04", k:"EXP via BAYSIDE"}, {t:"17:10", k:"ALL STOPS"}, {t:"17:50", k:"EXP via BAYSIDE"}, {t:"17:53", k:"ALL STOPS"}, {t:"18:25", k:"EXP via BAYSIDE"}, {t:"18:37", k:"ALL STOPS"}, {t:"19:09", k:"EXP via BAYSIDE, DOUGLASTON, LITTLE NECK"}, {t:"19:35", k:"EXP via BAYSIDE, DOUGLASTON, LITTLE NECK"}, {t:"20:16", k:"ALL STOPS"}, {t:"20:40", k:"ALL STOPS"}, {t:"21:18", k:"ALL STOPS"}, {t:"22:17", k:"ALL STOPS"}, {t:"22:45", k:"ALL STOPS"}, {t:"23:20", k:"ALL STOPS"}, {t:"23:45", k:"ALL STOPS"}];

    // --- BOARD CONFIG ---
    const BOARD_ROWS = [
        { 
            left: { type: 'standard_single', grad: 'grad-bar-1', name: 'Chambers St', displayLines: ['1'], filterLines: ['1'], stopId: '137S', feed: 'IRT', desc: 'South Ferry', dir: 'downtown', threshold: 6 },
            right: { type: 'split_generic', grad: 'grad-bar-1',
                cfg1: { name: 'Chambers St', displayLines: ['1'], filterLines: ['1'], stopId: '137N', feed: 'IRT', desc: 'Uptown Local', dir: 'uptown', threshold: 6 },
                cfg2: { type: 'lirr_static', name: 'LIRR Port Washington', desc: 'Departures @ NY Penn', displayLines: [] } } 
        },
        { type: 'split_arrival_view', grad: 'grad-bar-23',
            left: { name: 'Chambers St', displayLines: ['2','3'], filterLines: ['2','3','5'], stopId: '137S', feed: 'IRT', desc: 'Downtown & Brooklyn', dir: 'downtown', connType: 'Atlantic', threshold: 6 },
            right: { name: 'Chambers St', displayLines: ['2','3'], filterLines: ['2','3','5'], stopId: '137N', feed: 'IRT', desc: 'Uptown Express', dir: 'uptown', connType: 'TimesSq', threshold: 6 } },
        { type: 'split_arrival_view', grad: 'grad-bar-ACE',
            left: { name: 'Chambers St', displayLines: ['A','C'], filterLines: ['A','C','F','FX'], stopId: 'A36S', feed: ['ACE', 'BDFM'], desc: 'Downtown, Brooklyn & Rockaways', dir: 'downtown', connType: 'JaySt', threshold: 7 },
            right: { name: 'Chambers St', displayLines: ['A','C'], filterLines: ['A','C','F','FX'], stopId: 'A36N', feed: ['ACE', 'BDFM'], desc: 'Uptown', dir: 'uptown', connType: 'W4', threshold: 7 } },
        { left: { type: 'split_generic', grad: 'grad-bar-RW45',
                cfg1: { name: 'City Hall', displayLines: ['R','W'], filterLines: ['R','W','N','Q'], stopId: 'R24S', feed: 'NQRW', desc: 'Downtown & Brooklyn', dir: 'downtown', threshold: 8 },
                cfg2: { name: 'Bklyn Bridge', displayLines: ['4','5'], filterLines: ['4','5'], stopId: '640S', feed: 'IRT', desc: 'Downtown & Bklyn', dir: 'downtown', threshold: 10 } },
            right: { type: 'split_merged_header', grad: 'grad-bar-green', name: 'Bklyn Bridge-City Hall', desc: 'Uptown & The Bronx', dir: 'uptown', icons: ['4','5','6'], 
                cfg1: { displayLines: ['4','5'], filterLines: ['4','5'], stopId: '640N', feed: 'IRT', desc: 'Lexington Express', dir: 'uptown', threshold: 10 },
                cfg2: { displayLines: ['6','6X'], filterLines: ['6','6X'], stopId: '640N', feed: 'IRT', desc: 'Lexington Local', dir: 'uptown', threshold: 10 } } },
        { left: 'BRANDING', 
            right: { type: 'split_generic', grad: 'grad-bar-EJZ',
                cfg1: { name: 'World Trade Ctr', displayLines: ['E'], filterLines: ['E'], stopId: 'E01N', feed: 'ACE', desc: 'Queens & Jamaica', dir: 'uptown', threshold: 8 },
                cfg2: { name: 'Chambers St', displayLines: ['J','Z'], filterLines: ['J','Z','M'], stopId: 'M21N', feed: ['JZ', 'BDFM'], desc: 'East NY & Jamaica', dir: 'uptown', threshold: 10 } } }
    ];

    let globalData = { 'ACE': [], 'BDFM': [], 'NQRW': [], 'IRT': [], 'JZ': [] };
    let feedStatus = { 'ACE': false, 'BDFM': false, 'NQRW': false, 'IRT': false, 'JZ': false };

    // Massive GTFS-RT Protobuf Schema Definition
    const protoJSON = { "nested": { "transit_realtime": { "nested": { "FeedMessage": { "fields": { "header": { "type": "FeedHeader", "id": 1 }, "entity": { "rule": "repeated", "type": "FeedEntity", "id": 2 } } }, "FeedHeader": { "fields": { "gtfsRealtimeVersion": { "type": "string", "id": 1 }, "incrementality": { "type": "int32", "id": 2 }, "timestamp": { "type": "uint64", "id": 3 } } }, "FeedEntity": { "fields": { "id": { "type": "string", "id": 1 }, "isDeleted": { "type": "bool", "id": 2 }, "tripUpdate": { "type": "TripUpdate", "id": 3 } } }, "TripUpdate": { "fields": { "trip": { "type": "TripDescriptor", "id": 1 }, "stopTimeUpdate": { "rule": "repeated", "type": "StopTimeUpdate", "id": 2 } } }, "TripDescriptor": { "fields": { "tripId": { "type": "string", "id": 1 }, "routeId": { "type": "string", "id": 5 } } }, "StopTimeUpdate": { "fields": { "stopSequence": { "type": "uint32", "id": 1 }, "stopId": { "type": "string", "id": 4 }, "arrival": { "type": "StopTimeEvent", "id": 2 }, "departure": { "type": "StopTimeEvent", "id": 3 } } }, "StopTimeEvent": { "fields": { "delay": { "type": "int32", "id": 1 }, "time": { "type": "int64", "id": 2 }, "uncertainty": { "type": "int32", "id": 3 } } } } } } };

    // Robust Proxy Rotation - Automatically skips failing proxies
    const PROXIES = [
        '', // Attempt direct connection first
        'https://corsproxy.io/?',
        'https://api.codetabs.com/v1/proxy?quest='
    ];

    async function fetchWithProxy(url) {
        for (let proxy of PROXIES) {
            try {
                let targetUrl = proxy ? proxy + (proxy.includes('corsproxy') ? encodeURIComponent(url) : url) : url;
                const response = await fetch(targetUrl, { cache: 'no-store' });
                if (response.ok) return await response.arrayBuffer();
            } catch (e) {
                console.warn(`Fetch via ${proxy || 'direct'} failed.`);
            }
        }
        throw new Error("All network paths blocked");
    }

    function minsToTime(totalMins) {
        let h = Math.floor(totalMins / 60); let m = totalMins % 60; let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12; h = h ? h : 12; return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    async function init() {
        const root = protobuf.Root.fromJSON(protoJSON);
        const FeedMessage = root.lookupType("transit_realtime.FeedMessage");
        await fetchAllFeeds(FeedMessage);
        renderBoard();
        setInterval(async () => { await fetchAllFeeds(FeedMessage); renderBoard(); }, 15000);
    }

    async function fetchAllFeeds(FeedMessage) {
        const promises = Object.keys(FEEDS).map(async (key) => {
            try {
                const buffer = await fetchWithProxy(FEEDS[key] + '?t=' + Date.now());
                const message = FeedMessage.decode(new Uint8Array(buffer));
                globalData[key] = FeedMessage.toObject(message, { longs: String }).entity.filter(e => e.tripUpdate).map(e => e.tripUpdate);
                feedStatus[key] = true;
            } catch (err) {
                console.error("Critical Feed Failure for", key, err);
                feedStatus[key] = false; // Triggers UI Error Block
            }
        });
        await Promise.all(promises);
    }

    function getArrivals(feedKeys, stopId, filterRoutes) {
        if (!Array.isArray(feedKeys)) feedKeys = [feedKeys];
        let arrivals = []; let seenTrips = new Set(); const now = Date.now() / 1000;
        
        feedKeys.forEach(feedKey => {
            if (!feedStatus[feedKey]) return;
            globalData[feedKey].forEach(trip => {
                const route = trip.trip.routeId;
                if (filterRoutes && !filterRoutes.includes(route)) return;
                if (trip.stopTimeUpdate) {
                    trip.stopTimeUpdate.forEach(stu => {
                        if (stu.stopId === stopId) {
                            let time = stu.arrival?.time ? parseInt(stu.arrival.time) : (stu.departure?.time ? parseInt(stu.departure.time) : null);
                            if (time && time > now) {
                                if (!seenTrips.has(trip.trip.tripId)) {
                                    seenTrips.add(trip.trip.tripId);
                                    arrivals.push({ route: route, time: time, minutes: Math.floor((time - now) / 60), tripId: trip.trip.tripId });
                                }
                            }
                        }
                    });
                }
            });
        });
        return arrivals.sort((a, b) => a.time - b.time);
    }

    function getHubArrivalTime(feedKey, tripId, hubStopId) {
        const trip = globalData[feedKey].find(t => t.trip.tripId === tripId);
        if (trip && trip.stopTimeUpdate) {
            const stopUpdate = trip.stopTimeUpdate.find(s => s.stopId === hubStopId);
            if (stopUpdate && stopUpdate.arrival) return parseInt(stopUpdate.arrival.time);
        }
        return null;
    }

    function getScheduleConnection(hubArrivalTime, scheduleData, typeLabel, bufferMins) {
        const day = new Date().getDay();
        if (day === 0 || day === 6) return [{ route: typeLabel, time: 'No Service', wait: 0, rawWait: 999, isError: true }];
        const arrivalMins = new Date(hubArrivalTime * 1000).getHours() * 60 + new Date(hubArrivalTime * 1000).getMinutes();
        const minDeparture = arrivalMins + bufferMins; 
        let connections = [];
        for (let item of scheduleData) {
            let tStr = typeof item === 'string' ? item : item.t;
            let tag = typeof item === 'string' ? '' : item.k;
            const [h, m] = tStr.split(':').map(Number);
            const schedMins = h * 60 + m;
            if (schedMins > minDeparture) {
                let wait = schedMins - arrivalMins;
                connections.push({ route: typeLabel, time: `${minsToTime(schedMins)} (+${wait}m)`, wait: wait, rawWait: wait, isSchedule: true, tag: tag });
                if (connections.length >= 2) break;
            }
        }
        return connections.length ? connections : [{ route: typeLabel, time: 'No connections shown', wait: 0, rawWait: 999, isError: true }];
    }

    // New advanced train finder that looks ahead at multiple candidates and identifies their final destination 
    function findTrainsForRoute(feedKey, stopId, route, cutoffTime) {
        if (!feedStatus[feedKey]) return [];
        let candidates = [];
        globalData[feedKey].forEach(trip => {
            if (trip.trip.routeId !== route) return;
            if (trip.stopTimeUpdate && trip.stopTimeUpdate.length > 0) {
                const lastStop = trip.stopTimeUpdate[trip.stopTimeUpdate.length - 1].stopId;
                trip.stopTimeUpdate.forEach(stu => {
                    if (stu.stopId === stopId && stu.departure?.time) {
                        const depTime = parseInt(stu.departure.time);
                        if (depTime > cutoffTime) {
                            candidates.push({ route: route, time: depTime, wait: Math.floor((depTime - cutoffTime) / 60) + 1, destId: lastStop, tripId: trip.trip.tripId });
                        }
                    }
                });
            }
        });
        candidates.sort((a, b) => a.time - b.time);
        return candidates;
    }

    function findNextForRoute(feedKey, stopId, route, cutoffTime) {
        const trains = findTrainsForRoute(feedKey, stopId, route, cutoffTime);
        return trains.length > 0 ? trains[0] : null;
    }

    function getComplexConnections(type, arrivalTimeUnix) {
        let conns = [];
        if (type === 'Atlantic') {
            const arr = arrivalTimeUnix + (RIDE_TIMES.ChambersToAtlantic * 60);
            ['B','Q','D','N','R'].forEach(r => {
                let t = findNextForRoute((r==='B'||r==='D') ? 'BDFM' : 'NQRW', (r==='B'||r==='Q') ? 'D24S' : 'R31S', r, arr + 60); if(t) conns.push(t);
            });
        } else if (type === 'W4') {
            const arr = arrivalTimeUnix + (RIDE_TIMES.ChambersToW4 * 60);
            ['B','D','F','M','FX'].forEach(rt => {
                const t = findNextForRoute('BDFM', 'D20N', rt, arr + 60); if(t) conns.push(t);
            });
        } else if (type === 'TimesSq') {
            const arr = arrivalTimeUnix + (RIDE_TIMES.ChambersToTimesSq * 60);
            const seven = findNextForRoute('IRT', '725N', '7', arr + 60); if (seven) conns.push(seven);
            const sevenX = findNextForRoute('IRT', '725N', '7X', arr + 60); if (sevenX) conns.push(sevenX);
            const one = findNextForRoute('IRT', '127N', '1', arr + 60); if (one) conns.push(one);

            const sN = findNextForRoute('IRT', '902N', 'GS', arr + 60);
            const sS = findNextForRoute('IRT', '902S', 'GS', arr + 60);
            if (sN && sS) { conns.push(sN.time < sS.time ? sN : sS); } else if (sN) { conns.push(sN); } else if (sS) { conns.push(sS); }

            ['N','Q','R','W'].forEach(rt => {
                const t = findNextForRoute('NQRW', 'R16N', rt, arr + 60); if (t) conns.push(t);
            });
        } else if (type === 'JaySt') {
            const arr = arrivalTimeUnix + (RIDE_TIMES.ChambersToJay * 60);
            const fTrains = findTrainsForRoute('BDFM', 'A41S', 'F', arr + 60);
            
            let addedConey = false; let addedOther = false;
            fTrains.forEach(f => {
                let isConey = (f.destId === 'X25S' || f.destId === 'D43S');
                let map = {'X25S':'Coney Is', 'D43S':'Coney Is', 'F27S':'Church Av', 'F35S':'Kings Hwy', 'F32S':'Bay Pkwy', 'F30S':'18 Av'};
                let friendlyName = map[f.destId];

                if (isConey && !addedConey) {
                    f.destText = 'Coney Is'; conns.push(f); addedConey = true;
                } else if (!isConey && !addedOther) {
                    f.destText = friendlyName || 'Bklyn'; conns.push(f); addedOther = true;
                }
            });
            
            const fx = findNextForRoute('BDFM', 'A41S', 'FX', arr + 60); if(fx) conns.push(fx);
            const r = findNextForRoute('NQRW', 'R29S', 'R', arr + 60); if(r) conns.push(r);
        }

        conns.forEach(c => {
            let hubArr = arrivalTimeUnix + (RIDE_TIMES['ChambersTo' + (type === 'W4' ? 'W4' : (type==='JaySt'?'Jay':(type==='TimesSq'?'TimesSq':'Atlantic')))] * 60);
            c.wait = Math.floor((c.time - hubArr) / 60);
        });
        return conns.sort((a, b) => a.time - b.time);
    }

    function getBulletHTML(route, sizeClass) {
        if (route === 'FX') return `<div class="bullet ${sizeClass} b-diamond b-F"><span>F</span></div>`;
        if (route === '6X') return `<div class="bullet ${sizeClass} b-diamond b-6"><span>6</span></div>`;
        if (route === '7X') return `<div class="bullet ${sizeClass} b-diamond b-7"><span>7</span></div>`;
        if (route === 'GS') return `<div class="bullet ${sizeClass} b-S">S</div>`;
        return `<div class="bullet ${sizeClass} b-${route}">${route}</div>`;
    }

    function getLineColorClass(lines) {
        if (!lines) return 'grad-cold';
        const s = new Set(Array.isArray(lines) ? lines : [lines]);
        if (s.has('1') || s.has('2') || s.has('3') || s.has('A') || s.has('C') || s.has('E')) return 'grad-text-blue';
        if (s.has('4') || s.has('5') || s.has('6') || s.has('6X')) return 'grad-text-green';
        if (s.has('N') || s.has('Q') || s.has('R') || s.has('W')) return 'grad-text-yellow';
        if (s.has('B') || s.has('D') || s.has('F') || s.has('M') || s.has('FX')) return 'grad-text-orange';
        if (s.has('J') || s.has('Z')) return 'grad-text-brown';
        if (s.has('7') || s.has('7X')) return 'grad-text-purple';
        if (s.has('GS') || s.has('S') || s.has('L')) return 'grad-text-gray';
        return 'grad-cold';
    }

    function getConnectionsHTMLBlock(train, cfg) {
        if (cfg.connType === 'None') return '';
        let conns = [], label = ""; let gradClass = getLineColorClass(cfg.displayLines || cfg.lines);

        if (cfg.connType === 'Ferry') {
            label = "Connections To St George"; conns = getScheduleConnection(getHubArrivalTime('IRT', train.tripId, '142S') || (train.time + 300), FERRY_SCHED, 'SF', 0);
        } else if (cfg.connType.startsWith('LIRR')) {
            label = "LIRR Port Washington Connections @ Penn"; conns = getScheduleConnection(getHubArrivalTime('IRT', train.tripId, '128N') || (train.time + 360), LIRR_PW_SCHED, 'PW', 0);
        } else if (cfg.connType === 'Atlantic') {
            label = "South Brooklyn Transfers @ Atlantic Av"; conns = getComplexConnections('Atlantic', train.time);
        } else if (cfg.connType === 'JaySt') {
            label = "South Brooklyn Transfers @ Jay St"; conns = getComplexConnections('JaySt', train.time);
        } else if (cfg.connType === 'W4') {
            label = "Uptown Transfers @ W 4 St"; conns = getComplexConnections('W4', train.time);
        } else if (cfg.connType === 'TimesSq') {
            label = "Uptown Transfers @ Times Square"; conns = getComplexConnections('TimesSq', train.time);
        }

        let html = `<div class="conn-block"><span class="conn-label ${gradClass} conn-label-block">${label}</span>`;
        if (conns.length > 0 && !conns[0].isError) {
            let renderChips = (chipArray) => {
                let rHtml = `<div class="conn-chips-row no-scrollbar" style="margin-bottom: 3px;">`;
                chipArray.forEach(c => {
                    if (!c.isError) {
                        let timeDisplay = c.isSchedule ? `${c.time}` : `<span class="${c.wait < 3 ? 'chip-time-warn' : 'chip-time-pos'}">+${c.wait}m</span>`;
                        
                        if (c.route === 'F' && c.destText) {
                            timeDisplay += `<span style="margin-left: 2px;">: ${c.destText}</span>`;
                        }

                        let bullet = (c.route === 'PW' || c.route === 'SF') ? '' : getBulletHTML(c.route, 'b-sm');
                        if (c.route === 'SF') bullet = `<div class="bullet b-sm b-SF">Ferry</div>`;
                        let badge = c.route === 'PW' ? `<span class="tag-lirr ${c.tag==='ALL STOPS'?'tag-lcl':'tag-exp'}">${c.tag}</span>` : '';
                        rHtml += `<div class="chip">${badge}${bullet}<span style="font-size:0.8em">${timeDisplay}</span></div>`;
                    }
                });
                rHtml += `</div>`;
                return rHtml;
            };

            if (cfg.connType === 'TimesSq') {
                let topConns = conns.filter(c => ['7', '7X', '1', 'GS'].includes(c.route));
                let botConns = conns.filter(c => ['N', 'Q', 'R', 'W'].includes(c.route));
                
                if (topConns.length > 0) html += renderChips(topConns);
                if (botConns.length > 0) html += renderChips(botConns);
            } else {
                html += renderChips(conns);
            }
        } else {
            html += `<span class="dim" style="font-size:0.7em">No connections shown at this time</span>`;
        }
        return html + `</div>`;
    }

    function renderNextUpBlock(arrivals) {
        let html = `<div class="next-up-block"><span class="conn-label grad-following" style="font-size: 0.6em; margin-bottom:2px;">NEXT UP</span><div class="next-up-chips-row">`;
        arrivals.forEach(n => html += `<div class="chip" style="padding:1px 4px;">${getBulletHTML(n.route, 'b-sm')}<span class="next-time">${n.minutes}m</span></div>`);
        return html + `</div></div>`;
    }

    function checkFeedStatus(cfg) {
        let feeds = Array.isArray(cfg.feed) ? cfg.feed : [cfg.feed];
        return feeds.every(f => !feedStatus[f]); 
    }

    function renderCompactRowHTML(cfg, arrivals, isFeedDown) {
        if (isFeedDown) return `<div class="dim error-msg" style="margin-top:5px;">⚠️ Data Feed Offline (Proxy Blocked)</div>`;
        if (!arrivals || arrivals.length === 0) return `<div class="dim" style="margin-top:5px;">No upcoming trains</div>`;
        const first = arrivals[0];
        let timeHTML = first.minutes === cfg.threshold ? `<span class="time-large time-warn">${first.minutes}</span> <span class="time-sub time-warn">min</span>` : `<span class="time-large">${first.minutes}</span> <span class="time-sub">min</span>`;
        let subsequent = arrivals.slice(1, 3);
        let rightHTML = subsequent.length > 0 ? renderNextUpBlock(subsequent) : `<div class="dim" style="font-size:0.7em">No further departures</div>`;
        return `<div class="train-row"><div class="train-time-group" style="margin-right:15px;">${getBulletHTML(first.route, 'b-main')}${timeHTML}</div><div style="display:flex; align-items:center;">${rightHTML}</div></div>`;
    }

    function renderInlineHeader(cfg) {
        let dirIcon = cfg.dir === 'downtown' ? '↓' : '↑'; let dirClass = cfg.dir === 'downtown' ? 'dir-downtown' : 'dir-uptown';
        let icons = (cfg.displayLines || []).map(l => getBulletHTML(l, 'b-lg')).join('');
        return `<div class="card-header-inline no-scrollbar"><div class="header-text-group"><span class="header-inline-station">${cfg.name}</span>${cfg.desc ? `<span class="direction-tag ${dirClass}" style="margin-left: 6px;">${dirIcon} ${cfg.desc}</span>` : ''}</div><div class="header-icons-group">${icons}</div></div>`;
    }

    function renderNextSecondSplit(cfg, gradClass, sideClass) {
        const card = document.createElement('div'); card.className = `transit-card ${gradClass} ${sideClass}`;
        let html = renderInlineHeader(cfg);
        let isFeedDown = checkFeedStatus(cfg);
        let arrivals = getArrivals(cfg.feed, cfg.stopId, cfg.filterLines).filter(t => t.minutes >= cfg.threshold);
        
        if (isFeedDown) {
            html += `<div class="dim error-msg" style="margin-top:20px;">⚠️ Data Feed Offline (Proxy Blocked)</div>`;
        } else if (arrivals.length === 0) {
            html += `<div class="dim" style="margin-top:20px;">No upcoming trains</div>`;
        } else {
            const first = arrivals[0]; const second = arrivals.length > 1 ? arrivals[1] : null; const nextUp = arrivals.slice(2, 4);
            html += `<div class="split-body"><div class="split-body-left"><div class="split-sub-header">NEXT TRAIN</div>`;
            let timeHTML1 = first.minutes === cfg.threshold ? `<span class="time-large time-warn">${first.minutes}</span> <span class="time-sub time-warn">min</span>` : `<span class="time-large">${first.minutes}</span> <span class="time-sub">min</span>`;
            html += `<div class="train-main-info">${getBulletHTML(first.route, 'b-main')}${timeHTML1}</div>${getConnectionsHTMLBlock(first, cfg)}</div><div class="vertical-divider"></div><div class="split-body-right"><div class="split-sub-header">SECOND TRAIN</div>`;
            
            if (second) {
                html += `<div class="second-train-row">`;
                let timeHTML2 = second.minutes === cfg.threshold ? `<span class="time-med time-warn">${second.minutes}</span> <span class="time-sub time-warn">min</span>` : `<span class="time-med">${second.minutes}</span> <span class="time-sub">min</span>`;
                html += `<div class="train-time-group">${getBulletHTML(second.route, 'b-med')}${timeHTML2}</div>${nextUp.length > 0 ? renderNextUpBlock(nextUp) : ''}</div>${getConnectionsHTMLBlock(second, cfg)}`;
            } else { html += `<div class="dim" style="font-size:0.8em">--</div>`; }
            html += `</div></div>`; 
        }
        card.innerHTML = html; return card;
    }

    function renderStandardSingle(cfg, gradClass, sideClass) {
        const card = document.createElement('div'); card.className = `transit-card ${gradClass} ${sideClass}`;
        let isFeedDown = checkFeedStatus(cfg);
        let arrivals = getArrivals(cfg.feed, cfg.stopId, cfg.filterLines).filter(t => t.minutes >= cfg.threshold);
        let html = renderInlineHeader(cfg);

        if (isFeedDown) {
            html += `<div class="dim error-msg" style="margin-top:20px;">⚠️ Data Feed Offline (Proxy Blocked)</div>`;
        } else if (arrivals.length === 0) {
            html += `<div class="dim" style="margin-top:20px;">No upcoming trains</div>`;
        } else {
             const train = arrivals[0]; let subsequent = arrivals.slice(1, 3);
             let timeHTML = train.minutes === cfg.threshold ? `<span class="time-large time-warn">${train.minutes}</span> <span class="time-sub time-warn">min</span>` : `<span class="time-large">${train.minutes}</span> <span class="time-sub">min</span>`;
             html += `<div class="train-row"><div class="train-time-group" style="margin-right: 15px;">${getBulletHTML(train.route, 'b-main')}${timeHTML}</div>${subsequent.length > 0 ? renderNextUpBlock(subsequent) : ''}</div>`;
        }
        card.innerHTML = html; return card;
    }

    function renderLIRRStaticContent(cfg) {
        let now = new Date();
        let currentMins = now.getHours() * 60 + now.getMinutes();
        let departures = [];
        for (let item of LIRR_PW_SCHED) {
            let [h, m] = item.t.split(':').map(Number);
            let schedMins = h * 60 + m;
            if (schedMins > currentMins) {
                departures.push({ time: item.t, tag: item.k, rawMins: schedMins });
                if (departures.length >= 2) break;
            }
        }
        if (departures.length < 2) {
            departures.push({ time: LIRR_PW_SCHED[0].t, tag: LIRR_PW_SCHED[0].k, rawMins: 999 });
            if (departures.length < 2) departures.push({ time: LIRR_PW_SCHED[1].t, tag: LIRR_PW_SCHED[1].k, rawMins: 999 });
        }

        let html = `<div class="card-header-inline no-scrollbar"><div class="header-text-group"><span class="header-inline-station">${cfg.name}</span></div></div>`;
        html += `<div class="split-sub-header" style="margin-bottom:6px;">${cfg.desc.toUpperCase()}</div>`;
        html += `<div style="display: flex; flex-direction: column; justify-content: space-around; flex-grow: 1; padding-bottom: 5px;">`;
        
        departures.forEach(d => {
            let formattedTime = minsToTime(d.rawMins === 999 ? parseInt(d.time.split(':')[0])*60 + parseInt(d.time.split(':')[1]) : d.rawMins);
            let tagClass = d.tag === 'ALL STOPS' ? 'tag-lcl' : 'tag-exp';
            html += `<div style="display:flex; align-items:center; gap: 10px; font-size: 0.95em; font-weight: 600; color: #e5e5ea; margin-bottom: 2px;">
                        <span class="tag-lirr ${tagClass}" style="font-size: 0.75em; padding: 2px 6px; letter-spacing: 0.5px; min-width: 65px; text-align: center;">${d.tag}</span>
                        <span>${formattedTime}</span>
                     </div>`;
        });
        html += `</div>`;
        return html;
    }

    function renderCompactContent(cfg) {
        let isFeedDown = checkFeedStatus(cfg);
        let arrivals = getArrivals(cfg.feed, cfg.stopId, cfg.filterLines).filter(t => t.minutes >= cfg.threshold);
        return renderInlineHeader(cfg) + renderCompactRowHTML(cfg, arrivals, isFeedDown);
    }

    function renderSplitCard(cfg1, cfg2, gradClass) {
        const card = document.createElement('div'); card.className = `transit-card ${gradClass} card-right`;
        let html1 = cfg1.type === 'lirr_static' ? renderLIRRStaticContent(cfg1) : renderCompactContent(cfg1);
        let html2 = cfg2.type === 'lirr_static' ? renderLIRRStaticContent(cfg2) : renderCompactContent(cfg2);
        card.innerHTML = `<div class="split-card-container no-scrollbar"><div class="split-half">${html1}</div><div class="vertical-divider"></div><div class="split-half">${html2}</div></div>`;
        return card;
    }

    function renderMergedHeaderSplitCard(name, desc, dir, icons, cfg1, cfg2, gradClass) {
        const card = document.createElement('div'); card.className = `transit-card ${gradClass} card-right`;
        let dirIcon = dir === 'downtown' ? '↓' : '↑'; let dirClass = dir === 'downtown' ? 'dir-downtown' : 'dir-uptown';
        let iconHtml = icons.map(l => getBulletHTML(l, 'b-lg')).join('');

        let headerHtml = `<div class="card-header-inline no-scrollbar"><div class="header-text-group"><span class="header-inline-station">${name}:</span><span class="direction-tag ${dirClass}">${dirIcon} ${desc}</span></div><div class="header-icons-group">${iconHtml}</div></div>`;

        let renderLabelledBody = (cfg) => {
            let isFeedDown = checkFeedStatus(cfg);
            let arrivals = getArrivals(cfg.feed, cfg.stopId, cfg.filterLines).filter(t => t.minutes >= cfg.threshold);
            return `<div class="split-sub-header" style="margin-bottom:6px;">${cfg.desc.toUpperCase()}</div>` + renderCompactRowHTML(cfg, arrivals, isFeedDown);
        };

        card.innerHTML = `${headerHtml}<div class="split-card-container no-scrollbar"><div class="split-half">${renderLabelledBody(cfg1)}</div><div class="vertical-divider" style="margin-top: 2px;"></div><div class="split-half">${renderLabelledBody(cfg2)}</div></div>`;
        return card;
    }

    function renderBoard() {
        const container = document.getElementById('board'); container.innerHTML = ''; 
        BOARD_ROWS.forEach(row => {
            if (row.left && row.left.type === 'standard_single') {
                container.appendChild(renderStandardSingle(row.left, row.left.grad, 'card-left'));
                container.appendChild(renderSplitCard(row.right.cfg1, row.right.cfg2, row.right.grad));
                return;
            }
            if (row.type === 'split_arrival_view') { container.appendChild(renderNextSecondSplit(row.left, row.grad, 'card-left')); container.appendChild(renderNextSecondSplit(row.right, row.grad, 'card-right')); return; }
            [row.left, row.right].forEach((cfg, index) => {
                if (!cfg) return; 
                if (cfg === 'BRANDING') {
                    const div = document.createElement('div'); div.className = 'transit-card branding-card';
                    div.innerHTML = `<div class="split-card-container no-scrollbar" style="width:100%;"><div class="split-half no-scrollbar" style="align-items: flex-end; justify-content: center; padding: 0 15px; overflow-x: auto;"><div class="project-name" style="white-space:nowrap;">Transit Dispatch 3.0</div></div><div class="vertical-divider" style="height: 40px; margin: auto 0;"></div><div class="split-half no-scrollbar" style="align-items: flex-start; justify-content: center; padding: 0 15px; overflow-x: auto;"><div class="brand-details" style="width: 100%;"><div class="brand-main" style="white-space:nowrap;"><span class="header-purple-grad" style="font-weight:800;">STUA: Stuy Transit & Urbanism Association</span></div><div class="brand-sub grad-ai" style="font-style: italic; white-space:nowrap;">Stay on Schedule</div></div></div></div>`;
                    container.appendChild(div); return;
                }
                if (typeof cfg === 'object' && cfg.type === 'split_merged_header') { container.appendChild(renderMergedHeaderSplitCard(cfg.name, cfg.desc, cfg.dir, cfg.icons, cfg.cfg1, cfg.cfg2, cfg.grad)); return; }
                if (typeof cfg === 'object' && cfg.type === 'split_generic') { container.appendChild(renderSplitCard(cfg.cfg1, cfg.cfg2, cfg.grad)); return; }
            });
        });
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: true });
        document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    setInterval(updateClock, 1000); updateClock(); init();
</script>
