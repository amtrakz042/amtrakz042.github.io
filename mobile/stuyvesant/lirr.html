<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIRR Tracker</title>
    <style>
        :root {
            --bg-color: #000000; --card-bg: #1c1c1e; --text-main: #ffffff; --text-dim: #8e8e93;
            --accent-green: #30d158; --accent-blue: #0a84ff; --accent-warn: #ff9f0a;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: var(--font-stack); margin: 0; padding: 12px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }

        /* MOBILE HEADER */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .back-btn { color: var(--accent-blue); text-decoration: none; font-size: 1.1em; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .header-right { font-family: var(--font-stack); font-weight: 700; font-size: 1.1em; background: linear-gradient(180deg, #FCCC0A, #ffffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* SINGLE COLUMN VERTICAL STACK */
        .board-grid { display: flex; flex-direction: column; gap: 15px; flex-grow: 1; overflow-y: auto; padding-bottom: 20px; }

        .transit-card { background-color: var(--card-bg); border-radius: 14px; padding: 12px 16px; display: flex; flex-direction: column; justify-content: flex-start; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .transit-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 6px; z-index: 10; }

        /* Line Gradients */
        .grad-bar-LIRR::before { background: linear-gradient(180deg, #0a84ff, #004e9e); }

        .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .card-header-inline { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 10px; flex-shrink: 0; overflow-x: auto; white-space: nowrap; gap: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .header-text-group { display: flex; align-items: center; font-size: 1.3em; font-weight: 700; color: #fff; white-space: nowrap; flex-shrink: 0; }
        .header-icons-group { display: flex; gap: 5px; flex-shrink: 0; }
        .header-inline-station { margin-right: 8px; }

        .bullet { display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; border-radius: 50%; }
        .b-LIRR { background-color: #0a84ff; padding: 0 8px; border-radius: 6px; font-size: 12px; height: 20px; width: auto; letter-spacing: 0.5px;}
        
        .tag-lirr { border-radius: 4px; padding: 2px 6px; font-size: 9px; font-weight: bold; color: white; margin-right: 4px; text-transform: uppercase; }
        .tag-exp { background-color: #EE352E; } .tag-lcl { background-color: #0039A6; } 

    </style>
</head>
<body>

    <div class="header-container">
        <a href="index.html" class="back-btn">‹ Lines</a>
        <div class="header-right" id="clock">00:00 AM</div>
    </div>

    <div class="board-grid" id="board">
    </div>

<script>
    const LIRR_PW_SCHED = [{t:"00:27", k:"ALL STOPS"}, {t:"03:17", k:"ALL STOPS"}, {t:"05:19", k:"ALL STOPS"}, {t:"06:55", k:"ALL STOPS"}, {t:"08:17", k:"ALL STOPS"}, {t:"09:16", k:"ALL STOPS"}, {t:"10:16", k:"ALL STOPS"}, {t:"11:16", k:"ALL STOPS"}, {t:"12:16", k:"ALL STOPS"}, {t:"13:16", k:"ALL STOPS"}, {t:"14:21", k:"ALL STOPS"}, {t:"15:14", k:"ALL STOPS"}, {t:"16:16", k:"EXP via BAYSIDE"}, {t:"16:19", k:"ALL STOPS"}, {t:"17:04", k:"EXP via BAYSIDE"}, {t:"17:10", k:"ALL STOPS"}, {t:"17:50", k:"EXP via BAYSIDE"}, {t:"17:53", k:"ALL STOPS"}, {t:"18:25", k:"EXP via BAYSIDE"}, {t:"18:37", k:"ALL STOPS"}, {t:"19:09", k:"EXP via BAYSIDE, DOUGLASTON, LITTLE NECK"}, {t:"19:35", k:"EXP via BAYSIDE, DOUGLASTON, LITTLE NECK"}, {t:"20:16", k:"ALL STOPS"}, {t:"20:40", k:"ALL STOPS"}, {t:"21:18", k:"ALL STOPS"}, {t:"22:17", k:"ALL STOPS"}, {t:"22:45", k:"ALL STOPS"}, {t:"23:20", k:"ALL STOPS"}, {t:"23:45", k:"ALL STOPS"}];

    const BOARD_ROWS = [
        { type: 'lirr_static', grad: 'grad-bar-LIRR', name: 'LIRR Port Washington', desc: 'Departures @ NY Penn', displayLines: ['LIRR'] }
    ];

    function minsToTime(totalMins) {
        let h = Math.floor(totalMins / 60); let m = totalMins % 60; let ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12; h = h ? h : 12; return `${h}:${m.toString().padStart(2, '0')} ${ampm}`;
    }

    function getBulletHTML(route) {
        return `<div class="bullet b-${route}">${route}</div>`;
    }

    function renderLIRRCard(cfg) {
        let now = new Date(); let currentMins = now.getHours() * 60 + now.getMinutes();
        let departures = [];
        
        for (let item of LIRR_PW_SCHED) {
            let [h, m] = item.t.split(':').map(Number); let schedMins = h * 60 + m;
            if (schedMins > currentMins) { 
                departures.push({ time: item.t, tag: item.k, rawMins: schedMins }); 
                if (departures.length >= 4) break; 
            }
        }
        
        // Wrap around past midnight
        if (departures.length === 0) { departures.push({ time: LIRR_PW_SCHED[0].t, tag: LIRR_PW_SCHED[0].k, rawMins: 999 }); }

        let html = `<div class="card-header-inline no-scrollbar"><div class="header-text-group"><span class="header-inline-station">${cfg.name}</span></div><div class="header-icons-group">${getBulletHTML('LIRR')}</div></div>`;
        html += `<div style="font-size: 0.7em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 12px; padding-left: 2px;">${cfg.desc}</div>`;
        html += `<div style="display: flex; flex-direction: column; justify-content: space-around; flex-grow: 1; padding: 5px 0;">`;
        
        departures.forEach(d => {
            let formattedTime = minsToTime(d.rawMins === 999 ? parseInt(d.time.split(':')[0])*60 + parseInt(d.time.split(':')[1]) : d.rawMins);
            let tagClass = d.tag === 'ALL STOPS' ? 'tag-lcl' : 'tag-exp';
            html += `<div style="display:flex; align-items:center; gap: 15px; font-size: 1.25em; font-weight: 600; color: #e5e5ea; margin-bottom: 14px;">
                        <span class="tag-lirr ${tagClass}" style="font-size: 0.7em; padding: 4px 10px; letter-spacing: 0.5px; min-width: 85px; text-align: center;">${d.tag}</span>
                        <span>${formattedTime}</span>
                     </div>`;
        });
        html += `</div>`;
        
        const card = document.createElement('div'); card.className = `transit-card ${cfg.grad}`; card.innerHTML = html; return card;
    }

    function renderBoard() {
        const container = document.getElementById('board'); container.innerHTML = ''; 
        BOARD_ROWS.forEach(cfg => { container.appendChild(renderLIRRCard(cfg)); });
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit' });
    }
    
    setInterval(updateClock, 1000); updateClock(); renderBoard();
    setInterval(renderBoard, 60000); // LIRR updates locally every 60s
</script>
</body>
</html>
