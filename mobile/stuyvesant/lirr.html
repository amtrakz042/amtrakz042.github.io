<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LIRR Departures | NY Penn</title>
    <script src="https://cdn.jsdelivr.net/npm/protobufjs@7.2.4/dist/protobuf.min.js"></script>
    <style>
        :root {
            --bg-color: #000000; 
            --card-bg: #1c1c1e; 
            --text-main: #ffffff; 
            --text-dim: #8e8e93;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: var(--font-stack); 
            margin: 0; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            box-sizing: border-box; 
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .clock {
            font-size: 16px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        #board {
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .departure-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid #4D5357; /* Default color */
        }

        .departure-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .dest-name {
            font-size: 18px;
            font-weight: 700;
        }

        .branch-tag {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .departure-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .dep-time {
            font-size: 22px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .track-info {
            font-size: 14px;
            font-weight: 600;
            color: #ff9f0a; /* Warning orange for TBD */
            background: rgba(255, 159, 10, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .track-assigned {
            color: #30d158; /* Green for assigned */
            background: rgba(48, 209, 88, 0.15);
        }

        .status-msg {
            text-align: center;
            color: var(--text-dim);
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>NY Penn Departures</h1>
        <div class="clock" id="clock">--:--:--</div>
    </div>

    <div id="board">
        <div class="status-msg">Fetching live MTA data...</div>
    </div>

<script>
    // Dictionary mapping common LIRR terminal IDs to readable names
    // You will need to expand this using your stops.txt file for all possible stations
    const stopDict = {
        "105": "Penn Station",
        "14": "Babylon",
        "144": "Port Washington",
        "156": "Ronkonkoma",
        "127": "Huntington",
        "140": "Port Jefferson",
        "84": "Hempstead",
        "115": "Long Beach",
        "133": "Oyster Bay",
        "121": "Montauk",
        "42": "Far Rockaway",
        "173": "West Hempstead",
        "102": "Jamaica"
    };

    // Dictionary for LIRR branch colors based on route_id
    const branchColors = {
        "1": { name: "Babylon Branch", color: "#00985F" },
        "2": { name: "Hempstead Branch", color: "#CE8E00" },
        "3": { name: "Oyster Bay Branch", color: "#00AF3F" },
        "4": { name: "Ronkonkoma Branch", color: "#A626AA" },
        "5": { name: "Montauk Branch", color: "#00B2A9" },
        "6": { name: "Long Beach Branch", color: "#FF6319" },
        "7": { name: "Far Rockaway Branch", color: "#6E3219" },
        "8": { name: "West Hempstead Branch", color: "#00A1DE" },
        "9": { name: "Port Washington Branch", color: "#C60C30" },
        "10": { name: "Port Jefferson Branch", color: "#006EC7" }
    };

    const PENN_STATION_ID = "105"; 
    const LIRR_FEED_URL = "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/lirr%2Fgtfs-lirr";
    const CORS_PROXY = "https://corsproxy.io/?"; 
    const PROTO_URL = "https://raw.githubusercontent.com/MobilityData/gtfs-realtime-bindings/master/gtfs-realtime.proto";

    async function fetchDepartures() {
        try {
            // 1. Load the GTFS-RT schema
            const root = await protobuf.load(PROTO_URL);
            const FeedMessage = root.lookupType("transit_realtime.FeedMessage");

            // 2. Fetch the binary data via proxy
            const response = await fetch(CORS_PROXY + encodeURIComponent(LIRR_FEED_URL));
            if (!response.ok) throw new Error("Failed to fetch feed");
            
            const buffer = await response.arrayBuffer();
            
            // 3. Decode the protocol buffer
            const message = FeedMessage.decode(new Uint8Array(buffer));
            const feed = FeedMessage.toObject(message, { enums: String, longs: String, defaults: true });

            let departures = [];

            // 4. Parse the entities for Penn Station departures
            feed.entity.forEach(entity => {
                if (entity.tripUpdate && entity.tripUpdate.stopTimeUpdate) {
                    const stops = entity.tripUpdate.stopTimeUpdate;
                    
                    // Find if this train stops at Penn Station
                    const pennStop = stops.find(s => s.stopId === PENN_STATION_ID);
                    
                    if (pennStop && pennStop.departure && pennStop.departure.time) {
                        // Exclude trains where Penn is the final stop (arrivals)
                        const lastStop = stops[stops.length - 1];
                        if (lastStop.stopId === PENN_STATION_ID) return;

                        const routeId = entity.tripUpdate.trip.routeId;
                        const destId = lastStop.stopId;
                        const destName = stopDict[destId] || `Stop ${destId}`;
                        
                        departures.push({
                            destName: destName,
                            routeId: routeId,
                            time: parseInt(pennStop.departure.time, 10),
                            // Track info is notoriously tricky in MTA GTFS-RT without the NYCT extension, 
                            // setting to TBD by default for static implementation
                            track: "TBD" 
                        });
                    }
                }
            });

            // 5. Sort by departure time
            departures.sort((a, b) => a.time - b.time);
            
            // 6. Filter out past trains (allow 1 min buffer)
            const nowSeconds = Math.floor(Date.now() / 1000);
            departures = departures.filter(d => d.time > nowSeconds - 60);

            renderBoard(departures);

        } catch (error) {
            console.error(error);
            document.getElementById('board').innerHTML = `<div class="status-msg" style="color: #ff3b30;">Data error. Check console.</div>`;
        }
    }

    function renderBoard(departures) {
        const board = document.getElementById('board');
        board.innerHTML = '';

        if (departures.length === 0) {
            board.innerHTML = `<div class="status-msg">No upcoming departures found.</div>`;
            return;
        }

        departures.forEach(d => {
            let dateObj = new Date(d.time * 1000);
            let formattedTime = dateObj.toLocaleTimeString('en-US', { hour12: true, hour: 'numeric', minute: '2-digit' });
            
            let branch = branchColors[d.routeId] || { name: "LIRR Train", color: "#4D5357" };
            
            // UI logic for Track assignment styling
            let trackClass = d.track === "TBD" ? "track-info" : "track-info track-assigned";
            let trackText = d.track === "TBD" ? "Track TBD" : `Trk ${d.track}`;

            const card = document.createElement('div');
            card.className = 'departure-card';
            card.style.borderLeftColor = branch.color;

            card.innerHTML = `
                <div class="departure-left">
                    <span class="dest-name">${d.destName}</span>
                    <span class="branch-tag" style="color: ${branch.color}">${branch.name}</span>
                </div>
                <div class="departure-right">
                    <span class="dep-time">${formattedTime}</span>
                    <span class="${trackClass}">${trackText}</span>
                </div>
            `;
            board.appendChild(card);
        });
    }

    function updateClock() {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour12: true });
    }

    // Initialize
    setInterval(updateClock, 1000);
    updateClock();
    fetchDepartures();
    
    // Refresh MTA data every 30 seconds
    setInterval(fetchDepartures, 30000);

</script>
</body>
</html>
