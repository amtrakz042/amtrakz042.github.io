<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coney Island Lines</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --card-hover: #2c2c2e;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color); color: #ffffff;
            font-family: var(--font-stack); margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 500px; width: 100%; }

        .header-top { display: flex; align-items: center; margin-bottom: 30px; position: relative; justify-content: center;}
        .back-btn { position: absolute; left: 0; color: #0a84ff; text-decoration: none; font-size: 1.1em; font-weight: 600; display: flex; align-items: center; gap: 4px; }
        
        .header-title { font-size: 1.3em; font-weight: 800; letter-spacing: -0.5px; white-space: nowrap; }
        .header-purple-grad {
            background: linear-gradient(90deg, #E0AAFF, #ffffff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .category-title {
            font-size: 0.9em; font-weight: 800; margin-top: 20px; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 1px; color: #8e8e93; padding-left: 5px;
        }

        .nav-card {
            display: flex; align-items: center; justify-content: space-between;
            background-color: var(--card-bg); padding: 18px 20px; border-radius: 16px;
            text-decoration: none; margin-bottom: 12px; transition: transform 0.2s ease;
        }

        .nav-card:active { transform: scale(0.97); background-color: var(--card-hover); }

        .bullet-group { display: flex; gap: 5px; align-items: center; }
        
        .bullet { display: flex; justify-content: center; align-items: center; font-weight: bold; color: white; border-radius: 50%; width: 28px; height: 28px; font-size: 15px;}
        .b-D, .b-F { background-color: #FF6319; }
        .b-N, .b-Q { background-color: #FCCC0A; color: black; }
        .b-bus { background-color: #0039A6; width: auto; padding: 0 8px; border-radius: 6px; font-size: 12px; }

        .nav-text { font-size: 1.1em; font-weight: 700; color: #fff; margin-left: 15px; }
        .arrow-icon { color: #555; font-weight: bold; font-size: 1.4em; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-top">
            <a href="../index.html" class="back-btn">‹ Directory</a>
            <div class="header-title header-purple-grad">Coney Island-Stillwell Ave</div>
        </div>

        <div class="category-title">Select Service Type</div>
        
        <a href="subway.html" class="nav-card">
            <div style="display:flex; align-items:center;">
                <div class="bullet-group">
                    <div class="bullet b-D">D</div><div class="bullet b-F">F</div>
                    <div class="bullet b-N">N</div><div class="bullet b-Q">Q</div>
                </div>
                <span class="nav-text">Subway Lines</span>
            </div><span class="arrow-icon">›</span>
        </a>

        <a href="bus.html" class="nav-card">
            <div style="display:flex; align-items:center;">
                <div class="bullet-group">
                    <div class="bullet b-bus">B36</div><div class="bullet b-bus">B64</div>
                    <div class="bullet b-bus">B68</div><div class="bullet b-bus">+</div>
                </div>
                <span class="nav-text">Bus Lines</span>
            </div><span class="arrow-icon">›</span>
        </a>

    </div>

</body>
</html>
