<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUA Transit Directory</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --card-hover: #2c2c2e;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: var(--font-stack);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .header-title {
            font-size: 2.2em;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
            /* Transit Dispatch Gold Gradient */
            background: linear-gradient(45deg, #FFD700 0%, #FCCC0A 20%, #ffffff 70%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .header-subtitle {
            font-size: 1.1em;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            font-style: italic;
            /* STUA Purple Gradient */
            background: linear-gradient(90deg, #E0AAFF, #ffffff);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .category-title {
            font-size: 1.2em;
            font-weight: 800;
            margin-top: 30px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            /* STUA Purple Gradient */
            background: linear-gradient(90deg, #E0AAFF, #ffffff);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            padding-left: 5px;
        }

        .nav-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--card-bg);
            padding: 20px 25px;
            border-radius: 16px;
            text-decoration: none;
            margin-bottom: 15px;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .nav-card:active, .nav-card:hover {
            transform: scale(0.98);
            background-color: var(--card-hover);
        }

        .nav-text {
            font-size: 1.4em;
            font-weight: 800;
            letter-spacing: -0.5px;
            /* Transit Dispatch Gold Gradient */
            background: linear-gradient(45deg, #FFD700 0%, #FCCC0A 20%, #ffffff 70%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }
        
        .mobile-text {
            font-size: 1.4em;
            font-weight: 800;
            letter-spacing: -0.5px;
            /* Sleek Blue Gradient for the Mobile Button */
            background: linear-gradient(90deg, #5AC8FA, #0a84ff);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .arrow-icon {
            color: #8e8e93;
            font-weight: bold;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-title">Transit Directory</div>
        <div class="header-subtitle">Stay on Schedule</div>

        <!-- MOBILE REDIRECT BUTTON -->
        <a href="mobile/index.html" class="nav-card">
            <span class="mobile-text">📱 Use Mobile Site</span>
            <span class="arrow-icon">›</span>
        </a>

        <!-- RESIDENCES SECTION -->
        <div class="category-title">Residences</div>
        
        <a href="stillwell.html" class="nav-card">
            <span class="nav-text">Coney Island</span>
            <span class="arrow-icon">›</span>
        </a>

        <a href="#" class="nav-card">
            <span class="nav-text">Home1</span>
            <span class="arrow-icon">›</span>
        </a>

        <a href="#" class="nav-card">
            <span class="nav-text">Home2</span>
            <span class="arrow-icon">›</span>
        </a>


        <!-- PLACES OF INTEREST SECTION -->
        <div class="category-title">Places of Interest</div>
        
        <a href="stuyvesant.html" class="nav-card">
            <span class="nav-text">Stuyvesant HS</span>
            <span class="arrow-icon">›</span>
        </a>

        <a href="#" class="nav-card">
            <span class="nav-text">Place1</span>
            <span class="arrow-icon">›</span>
        </a>

        <a href="#" class="nav-card">
            <span class="nav-text">Place2</span>
            <span class="arrow-icon">›</span>
        </a>

    </div>

</body>
</html>
